<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("scoutTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #2f2b29;
      --cp-bg-elevated: #3a3431;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f1eee9;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-pattern-line: rgba(255, 255, 255, 0.08);
      --cp-pattern-node: rgba(245, 158, 11, 0.16);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #151413;
      --cp-bg-elevated: #242120;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-pattern-line: rgba(255, 255, 255, 0.07);
      --cp-pattern-node: rgba(253, 142, 161, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 16%, var(--cp-pattern-node), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(0, 120, 212, 0.12), transparent 30%),
        linear-gradient(30deg, transparent 24%, var(--cp-pattern-line) 25%, var(--cp-pattern-line) 26%, transparent 27%, transparent 74%, var(--cp-pattern-line) 75%, var(--cp-pattern-line) 76%, transparent 77%),
        linear-gradient(150deg, transparent 24%, var(--cp-pattern-line) 25%, var(--cp-pattern-line) 26%, transparent 27%, transparent 74%, var(--cp-pattern-line) 75%, var(--cp-pattern-line) 76%, transparent 77%),
        linear-gradient(135deg, var(--cp-bg-elevated), var(--cp-bg) 48%, #1f1d1c);
      background-size: auto, auto, 96px 96px, 96px 96px, auto;
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.55;
    }

    a {
      color: var(--cp-link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .panel {
      background: var(--cp-surface);
      border: 1px solid var(--cp-border-strong);
      border-radius: 16px;
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .hero {
      padding: 44px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 42%;
      height: 6px;
      background: var(--cp-warning);
    }

    .hero > * {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--cp-text-muted);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      font-family: Bahnschrift, "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 0.9;
      letter-spacing: -0.06em;
    }

    h2 {
      margin: 0 0 16px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .tagline {
      max-width: 720px;
      margin: 20px 0 0;
      color: var(--cp-text-muted);
      font-size: clamp(1.1rem, 2.2vw, 1.4rem);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }

    .nav-shell {
      margin: 18px 0;
    }

    .nav-shell .nav {
      margin: 0;
    }

    .nav a {
      border: 1px solid var(--cp-border-strong);
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--cp-surface);
      color: var(--cp-text);
      font-weight: 700;
    }

    .nav a:hover {
      border-color: var(--cp-warning);
      text-decoration: none;
    }

    .tone-toggle {
      flex: 0 0 auto;
      margin-left: auto;
      padding: 10px 14px;
      border: 1px solid var(--cp-border-strong);
      border-radius: 999px;
      background: var(--cp-surface);
      color: var(--cp-text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .tone-toggle::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 8px;
      background: var(--cp-warning);
      transform: rotate(45deg);
    }

    .mobile-menu-button {
      display: none;
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--cp-border-strong);
      border-radius: 999px;
      background: var(--cp-surface);
      color: var(--cp-text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    html[data-mode="reader"] body {
      background: #f7f7f4;
      color: #1f2933;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.7;
    }

    html[data-mode="reader"] .page {
      width: min(860px, calc(100% - 32px));
    }

    html[data-mode="reader"] .panel,
    html[data-mode="reader"] .post-card {
      background: #ffffff;
      border-color: #d7d2ca;
      border-radius: 6px;
      box-shadow: none;
    }

    html[data-mode="reader"] .hero::before {
      display: none;
    }

    html[data-mode="reader"] .hero,
    html[data-mode="reader"] .section,
    html[data-mode="reader"] .footer {
      padding: 24px;
    }

    html[data-mode="reader"] .nav {
      border-bottom: 1px solid #d7d2ca;
      gap: 12px;
      padding-bottom: 12px;
    }

    html[data-mode="reader"] .nav a,
    html[data-mode="reader"] .tone-toggle {
      background: transparent;
      border-color: #d7d2ca;
      color: #1f2933;
    }

    html[data-mode="reader"] h1,
    html[data-mode="reader"] h2,
    html[data-mode="reader"] h3 {
      font-family: Georgia, "Times New Roman", serif;
      text-transform: none;
      letter-spacing: 0;
    }

    html[data-mode="reader"] h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      line-height: 1;
    }

    html[data-mode="reader"] .post-card {
      border-left: 4px solid #d97706;
    }

    .section {
      padding: 32px;
      margin-top: 18px;
    }

    .post-list {
      display: grid;
      gap: 16px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .post-card {
      padding: 20px;
      border: 1px solid var(--cp-border);
      border-left: 4px solid var(--cp-warning);
      border-radius: 12px;
      background: var(--cp-surface-soft);
    }

    .post-card h2,
    .post-card h3 {
      margin: 0 0 8px;
    }

    .post-card h2 a {
      color: var(--cp-warning);
    }

    .post-meta {
      color: var(--cp-text-soft);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .post-content {
      font-size: 1.05rem;
    }

    .post-content img {
      max-width: 100%;
      border-radius: 12px;
    }

    .footer {
      margin-top: 18px;
      padding: 20px;
      color: var(--cp-text-muted);
      text-align: center;
      font-size: 0.9rem;
    }

    @media (max-width: 720px) {
      .hero,
      .section {
        padding: 24px;
      }

      .mobile-menu-button {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .nav-shell .nav {
        display: none;
        margin-top: 10px;
      }

      .nav-shell .nav.open {
        display: grid;
        grid-template-columns: 1fr;
      }

      .nav-shell .nav a,
      .nav-shell .tone-toggle {
        width: 100%;
        justify-content: flex-start;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="nav-shell">
      <button class="mobile-menu-button" type="button" id="menuButton" aria-expanded="false" aria-controls="siteNav">Menu</button>
      <nav class="nav" id="siteNav" aria-label="Site navigation">
        <a href="/">Home</a>
        <a href="/blog/">Short Blogs</a>
        <button class="tone-toggle" type="button" id="modeToggle" aria-pressed="false">Reader Mode</button>
      </nav>
    </div>
    {{ content }}
    <footer class="footer panel">
      Jerome Short | AI Transformation | Field CTO Advisory | Cloud Modernization
    </footer>
  </main>
  <script>
    (() => {
      const button = document.getElementById("modeToggle");
      if (!button) return;

      const setMode = (isReader) => {
        document.documentElement.setAttribute("data-mode", isReader ? "reader" : "short");
        button.setAttribute("aria-pressed", String(isReader));
        button.textContent = isReader ? "Short Mode" : "Reader Mode";
      };

      setMode(false);
      button.addEventListener("click", () => {
        setMode(document.documentElement.getAttribute("data-mode") !== "reader");
      });
    })();

    (() => {
      const button = document.getElementById("menuButton");
      const menu = document.getElementById("siteNav");
      if (!button || !menu) return;

      button.addEventListener("click", () => {
        const isOpen = menu.classList.toggle("open");
        button.setAttribute("aria-expanded", String(isOpen));
        button.textContent = isOpen ? "Close menu" : "Menu";
      });

      menu.querySelectorAll("a").forEach((link) => {
        link.addEventListener("click", () => {
          if (window.matchMedia("(max-width: 720px)").matches) {
            menu.classList.remove("open");
            button.setAttribute("aria-expanded", "false");
            button.textContent = "Menu";
          }
        });
      });
    })();
  </script>
</body>
</html>
